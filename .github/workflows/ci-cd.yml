name: CI and Container Publish

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          PIP_CONSTRAINT="$PWD/build-constraints.txt" pip install --constraint build-constraints.txt -r requirements.txt

      - name: Compile source modules
        run: |
          python -m py_compile src/config_store.py src/db.py src/scrapers.py src/audio.py src/video.py src/uploader.py src/bot.py src/app.py

      - name: Run fast tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

  docker-image:
    needs: python-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      LOCAL_IMAGE: local/video-factory:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for verification
        run: |
          docker build -t "${LOCAL_IMAGE}" .

      - name: Verify built image
        env:
          RUN_IMAGE_TESTS: "1"
          IMAGE_UNDER_TEST: ${{ env.LOCAL_IMAGE }}
        run: |
          python -m unittest tests.test_image_smoke -v

      - name: Build and push GHCR image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REPO_LC=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          REMOTE_IMAGE="${REGISTRY}/${REPO_LC}"
          docker tag "${LOCAL_IMAGE}" "${REMOTE_IMAGE}:sha-${GITHUB_SHA}"
          docker tag "${LOCAL_IMAGE}" "${REMOTE_IMAGE}:latest"
          docker push "${REMOTE_IMAGE}:sha-${GITHUB_SHA}"
          docker push "${REMOTE_IMAGE}:latest"
